<!-- Sticky header: gator icon + search bar -->
<div class="search-bar">
  <!-- Gator icon -->
  <svg class="gator-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="34" rx="28" ry="22" fill="#fa4616" />
    <ellipse cx="20" cy="26" rx="6" ry="7" fill="#0021a5" />
    <ellipse cx="44" cy="26" rx="6" ry="7" fill="#0021a5" />
    <ellipse cx="20" cy="25" rx="3" ry="3.5" fill="#fff" />
    <ellipse cx="44" cy="25" rx="3" ry="3.5" fill="#fff" />
    <circle cx="20" cy="25" r="1.6" fill="#1a1a2e" />
    <circle cx="44" cy="25" r="1.6" fill="#1a1a2e" />
    <path
      d="M18 40 Q32 50 46 40"
      stroke="#1a1a2e"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
    />
    <rect x="22" y="39" width="3" height="4" rx="1" fill="#fff" />
    <rect x="28" y="40" width="3" height="4" rx="1" fill="#fff" />
    <rect x="34" y="40" width="3" height="4" rx="1" fill="#fff" />
    <rect x="40" y="39" width="3" height="4" rx="1" fill="#fff" />
  </svg>

  <!-- Search field -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search products</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      type="text"
      placeholder="Search by name or description…"
      [(ngModel)]="searchQuery"
    />
    @if (searchQuery) {
      <button matIconSuffix mat-icon-button (click)="searchQuery = ''" aria-label="Clear">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>

  <button mat-icon-button class="logout-icon" (click)="logout()" aria-label="Logout">
    <mat-icon>logout</mat-icon>
  </button>
</div>

<!-- Product list -->
<div class="product-grid">
  @for (product of filteredProducts; track product.id) {
    <mat-card class="product-card">
      <img mat-card-image [src]="product.image" [alt]="product.name" />
      <mat-card-header>
        <mat-card-title>{{ product.name }}</mat-card-title>
        <mat-card-subtitle>{{ product.description }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="price">{{ product.price | currency }}</p>
      </mat-card-content>
    </mat-card>
  }

  @if (filteredProducts.length === 0) {
    <p class="no-results">No products match your search.</p>
  }
</div>
