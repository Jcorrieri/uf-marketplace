<div class="listing-card">
  @if (listing.first_image_id) {
  <img
    [src]="'/api/images/' + listing.first_image_id"
    [alt]="listing.title"
    class="listing-image"
  />
  } @else {
  <div class="listing-image-placeholder">
    <mat-icon>image</mat-icon>
  </div>
  }
  <div class="listing-info">
    <h3 class="listing-title">{{ listing.title }}</h3>
    <p class="listing-description">{{ listing.description }}</p>
    <span class="listing-price">{{ listing.price | currency }}</span>
    <div class="listing-meta">
      <span class="listing-seller">
        <mat-icon class="meta-icon">person</mat-icon>
        {{ listing.seller_name }}
      </span>
    </div>

    <!-- Buy button — only shown when the user is NOT the seller -->
    @if (canBuy) {
      <button
        class="buy-btn"
        [class.buying]="purchasing()"
        [class.success]="purchaseSuccess()"
        (click)="buy($event)"
        [disabled]="purchasing()"
        id="buy-btn-{{ listing.id }}"
      >
        @if (purchasing()) {
          <mat-icon class="btn-icon spin">sync</mat-icon>
          Processing…
        } @else if (purchaseSuccess()) {
          <mat-icon class="btn-icon">check_circle</mat-icon>
          Purchased!
        } @else {
          <mat-icon class="btn-icon">shopping_cart</mat-icon>
          Buy Now
        }
      </button>
    }

    <!-- Inline error message -->
    @if (purchaseError()) {
      <p class="buy-error">{{ purchaseError() }}</p>
    }
  </div>
</div>
